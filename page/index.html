<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>

<body>
    <div class="book-container">
        <div class="book" id="book">
            <div class="paper active" style="z-index: 3;">
                <div class="front">
                    <img src="pagina1.png" alt="">
                </div>
                <div class="back">
                    <img src="pagina2.png" alt="">
                </div>
            </div>

            <div class="paper" style="z-index: 2;">
                <div class="front">
                    <img src="pagina3.png" alt="">
                </div>
                <div class="back">
                    <img src="pagina4.png" alt="">
                </div>
            </div>

             <div class="paper" style="z-index: 1;">
                <div class="front">
                    <img src="pagina5.png" alt="">
                </div>
                <div class="back">
                    <img src="pagina6.png" alt="">
                </div>
            </div>

        </div>
    </div>
</body>

</html>
